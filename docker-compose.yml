services:
  postgres:
    image: postgres:16-alpine
    container_name: mylifeplan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mylifeplan
    ports:
      - "5432:5432"
    volumes:
      - mylifeplan_pg:/var/lib/postgresql/data

volumes:
  mylifeplan_pg:
