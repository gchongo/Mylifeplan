services:
  postgres:
    image: postgres:16-alpine
    container_name: meridian-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meridian
    ports:
      - "5432:5432"
    volumes:
      - meridian_pg:/var/lib/postgresql/data

volumes:
  meridian_pg:
